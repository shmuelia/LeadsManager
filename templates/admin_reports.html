<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דוחות - לידים סגורים</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: #1e293b;
        }
        .wrap { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white; border-radius: 15px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .header h1 { margin: 0; font-size: 22px; }
        .header .build { font-size: 12px; color: #64748b; }
        .nav-back {
            background: #6366f1; color: white; padding: 10px 16px;
            border-radius: 8px; border: none; cursor: pointer; text-decoration: none;
            font-weight: 600; font-size: 14px;
        }
        .card {
            background: white; border-radius: 15px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .filters {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 14px;
        }
        .filters label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; }
        .filters input, .filters select {
            width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-size: 14px; background: white;
        }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            padding: 10px 18px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 14px;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-secondary { background: #e2e8f0; color: #1e293b; }
        .btn-success { background: #10b981; color: white; }
        .summary {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; margin-top: 10px;
        }
        .stat {
            background: #f8fafc; border-radius: 10px; padding: 12px; text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat .num { font-size: 22px; font-weight: 700; color: #1e293b; }
        .stat .lbl { font-size: 12px; color: #64748b; margin-top: 2px; }
        .reason-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
        .reason-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 10px; background: #f1f5f9; border-radius: 6px; font-size: 13px;
        }
        .reason-row .count { font-weight: 700; color: #6366f1; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 8px; text-align: right; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        th { background: #f8fafc; font-weight: 700; cursor: pointer; user-select: none; position: sticky; top: 0; }
        th .arrow { font-size: 10px; color: #94a3b8; margin-right: 4px; }
        tbody tr:hover { background: #f8fafc; }
        .reason-cell { max-width: 360px; white-space: pre-wrap; word-break: break-word; }
        .empty { text-align: center; padding: 40px; color: #64748b; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .table-wrap { overflow-x: auto; max-height: 65vh; overflow-y: auto; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            th, td { padding: 6px 4px; font-size: 12px; }
            .reason-cell { max-width: 200px; }
        }
        .print-meta { display: none; }
        @media print {
            body { background: white; padding: 0; color: #000; }
            .wrap { max-width: none; }
            .no-print { display: none !important; }
            .header, .card { box-shadow: none; border: 1px solid #ddd; border-radius: 0; margin-bottom: 10px; padding: 10px; }
            .table-wrap { max-height: none; overflow: visible; }
            table { font-size: 11px; }
            th { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            tbody tr:hover { background: white; }
            .reason-cell { max-width: none; }
            .print-meta { display: block; font-size: 12px; color: #444; margin-bottom: 8px; }
            @page { size: A4 landscape; margin: 12mm; }
        }
    </style>
</head>
<body>
<div class="wrap">

    <div class="header">
        <div>
            <h1>📊 דוח סגירות - סיבות סגירה של לידים</h1>
            <div class="build">v{{ version }} · {{ build_time }}</div>
        </div>
        <a href="/admin" class="nav-back no-print">⬅ חזרה לדשבורד</a>
    </div>

    <div class="card no-print">
        <div class="filters">
            <div>
                <label>מתאריך</label>
                <input type="date" id="f_from">
            </div>
            <div>
                <label>עד תאריך</label>
                <input type="date" id="f_to">
            </div>
            <div>
                <label>קמפיין</label>
                <select id="f_campaign"><option value="">כל הקמפיינים</option></select>
            </div>
            <div>
                <label>הוקצה ל</label>
                <select id="f_assigned"><option value="">כל המשתמשים</option></select>
            </div>
            <div>
                <label>נסגר על ידי</label>
                <select id="f_closer"><option value="">הכל</option></select>
            </div>
            <div>
                <label>סטטוס קודם</label>
                <select id="f_prev">
                    <option value="">הכל</option>
                    <option value="new">new</option>
                    <option value="contacted">contacted</option>
                    <option value="qualified">qualified</option>
                    <option value="interested">interested</option>
                    <option value="to_schedule_interview">to_schedule_interview</option>
                    <option value="interview_scheduled">interview_scheduled</option>
                    <option value="hired">hired</option>
                    <option value="rejected">rejected</option>
                </select>
            </div>
            <div>
                <label>סטטוס חדש</label>
                <select id="f_status">
                    <option value="closed" selected>closed</option>
                    <option value="rejected">rejected</option>
                    <option value="hired">hired</option>
                    <option value="">הכל</option>
                </select>
            </div>
            <div>
                <label>חיפוש בסיבה</label>
                <input type="text" id="f_reason" placeholder="טקסט בהערה...">
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-primary" onclick="loadReport()">🔍 רענן דוח</button>
            <button class="btn btn-secondary" onclick="resetFilters()">איפוס מסננים</button>
            <button class="btn btn-success" onclick="exportCsv()">⬇ ייצוא ל-CSV</button>
            <button class="btn btn-primary" onclick="exportPdf()">🖨 ייצוא ל-PDF</button>
        </div>
    </div>

    <div class="print-meta" id="print_meta"></div>

    <div class="card">
        <h3 style="margin: 0 0 10px 0;">סיכום</h3>
        <div class="summary">
            <div class="stat"><div class="num" id="stat_total">0</div><div class="lbl">סה"כ סגירות</div></div>
            <div class="stat"><div class="num" id="stat_unique_reasons">0</div><div class="lbl">סיבות שונות</div></div>
            <div class="stat"><div class="num" id="stat_top_reason_count">0</div><div class="lbl">סיבה נפוצה ביותר</div></div>
        </div>
        <h4 style="margin: 18px 0 8px 0;">פילוח לפי סיבה</h4>
        <div class="reason-list" id="reason_list"></div>
    </div>

    <div class="card">
        <div class="table-wrap">
            <table id="results_table">
                <thead>
                    <tr>
                        <th data-sort="lead_id">מס׳ <span class="arrow"></span></th>
                        <th data-sort="lead_name">שם <span class="arrow"></span></th>
                        <th data-sort="lead_phone">טלפון <span class="arrow"></span></th>
                        <th data-sort="lead_email">אימייל <span class="arrow"></span></th>
                        <th data-sort="campaign_name">קמפיין <span class="arrow"></span></th>
                        <th data-sort="assigned_to_name">הוקצה ל <span class="arrow"></span></th>
                        <th data-sort="closed_by">נסגר ע״י <span class="arrow"></span></th>
                        <th data-sort="closed_at">תאריך סגירה <span class="arrow"></span></th>
                        <th data-sort="previous_status">סטטוס קודם <span class="arrow"></span></th>
                        <th data-sort="reason">סיבה (הערה) <span class="arrow"></span></th>
                    </tr>
                </thead>
                <tbody id="results_body">
                    <tr><td colspan="10" class="loading">טוען נתונים...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
let currentRows = [];
let sortKey = 'closed_at';
let sortDir = 'desc';

function qs(id) { return document.getElementById(id); }

function buildQuery() {
    const params = new URLSearchParams();
    const map = {
        date_from: 'f_from', date_to: 'f_to',
        campaign: 'f_campaign', assigned_to: 'f_assigned',
        closed_by: 'f_closer', previous_status: 'f_prev',
        new_status: 'f_status', reason: 'f_reason'
    };
    for (const [k, id] of Object.entries(map)) {
        const v = qs(id).value;
        if (v) params.set(k, v);
    }
    return params.toString();
}

function fmtDate(iso) {
    if (!iso) return '';
    try {
        const d = new Date(iso);
        return d.toLocaleString('he-IL', { dateStyle: 'short', timeStyle: 'short' });
    } catch (e) { return iso; }
}

function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
}

function fillSelect(sel, items, valKey, labelKey) {
    const cur = sel.value;
    // keep first <option> (placeholder), drop the rest
    while (sel.options.length > 1) sel.remove(1);
    items.forEach(item => {
        const o = document.createElement('option');
        if (typeof item === 'string') {
            o.value = item; o.textContent = item;
        } else {
            o.value = item[valKey];
            o.textContent = item[labelKey] ? `${item[labelKey]} (${item[valKey]})` : item[valKey];
        }
        sel.appendChild(o);
    });
    sel.value = cur;
}

async function loadReport() {
    const body = qs('results_body');
    body.innerHTML = '<tr><td colspan="10" class="loading">טוען נתונים...</td></tr>';
    try {
        const res = await fetch('/admin/reports/closed-leads?' + buildQuery());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        currentRows = data.rows || [];

        // Populate filter dropdowns from server (unfiltered universe)
        if (data.filters) {
            fillSelect(qs('f_campaign'), data.filters.campaigns || []);
            fillSelect(qs('f_assigned'), (data.filters.users || []), 'username', 'full_name');
            fillSelect(qs('f_closer'), data.filters.closers || []);
        }

        renderSummary(data.summary || [], data.total || 0);
        renderTable();
    } catch (e) {
        body.innerHTML = `<tr><td colspan="10" class="empty">שגיאה בטעינה: ${escapeHtml(e.message)}</td></tr>`;
    }
}

function renderSummary(summary, total) {
    qs('stat_total').textContent = total;
    qs('stat_unique_reasons').textContent = summary.length;
    qs('stat_top_reason_count').textContent = summary.length ? summary[0].count : 0;
    const list = qs('reason_list');
    if (!summary.length) {
        list.innerHTML = '<div class="empty">אין נתונים</div>';
        return;
    }
    list.innerHTML = summary.map(s => `
        <div class="reason-row">
            <span>${escapeHtml(s.reason)}</span>
            <span class="count">${s.count}</span>
        </div>
    `).join('');
}

function renderTable() {
    const body = qs('results_body');
    if (!currentRows.length) {
        body.innerHTML = '<tr><td colspan="10" class="empty">לא נמצאו לידים שעונים על המסננים</td></tr>';
        updateSortArrows();
        return;
    }
    const sorted = [...currentRows].sort((a, b) => {
        const av = a[sortKey] ?? '';
        const bv = b[sortKey] ?? '';
        if (av < bv) return sortDir === 'asc' ? -1 : 1;
        if (av > bv) return sortDir === 'asc' ? 1 : -1;
        return 0;
    });
    body.innerHTML = sorted.map(r => `
        <tr>
            <td>${escapeHtml(r.lead_id)}</td>
            <td>${escapeHtml(r.lead_name)}</td>
            <td>${escapeHtml(r.lead_phone)}</td>
            <td>${escapeHtml(r.lead_email)}</td>
            <td>${escapeHtml(r.campaign_name)}</td>
            <td>${escapeHtml(r.assigned_to_name || r.assigned_to || '')}</td>
            <td>${escapeHtml(r.closed_by)}</td>
            <td>${escapeHtml(fmtDate(r.closed_at))}</td>
            <td>${escapeHtml(r.previous_status)}</td>
            <td class="reason-cell">${escapeHtml(r.reason)}</td>
        </tr>
    `).join('');
    updateSortArrows();
}

function updateSortArrows() {
    document.querySelectorAll('th[data-sort]').forEach(th => {
        const arrow = th.querySelector('.arrow');
        arrow.textContent = th.dataset.sort === sortKey ? (sortDir === 'asc' ? '▲' : '▼') : '';
    });
}

document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
        const k = th.dataset.sort;
        if (sortKey === k) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortKey = k; sortDir = 'asc';
        }
        renderTable();
    });
});

function resetFilters() {
    ['f_from','f_to','f_campaign','f_assigned','f_closer','f_prev','f_reason'].forEach(id => qs(id).value = '');
    qs('f_status').value = 'closed';
    loadReport();
}

function exportPdf() {
    if (!currentRows.length) { alert('אין נתונים לייצוא'); return; }
    const labels = {
        f_from: 'מתאריך', f_to: 'עד תאריך', f_campaign: 'קמפיין',
        f_assigned: 'הוקצה ל', f_closer: 'נסגר ע״י', f_prev: 'סטטוס קודם',
        f_status: 'סטטוס חדש', f_reason: 'חיפוש בסיבה'
    };
    const active = Object.entries(labels)
        .map(([id, lbl]) => {
            const el = qs(id);
            const v = el.value;
            if (!v) return null;
            const txt = el.tagName === 'SELECT' ? (el.options[el.selectedIndex]?.text || v) : v;
            return `${lbl}: ${txt}`;
        })
        .filter(Boolean)
        .join(' · ');
    const stamp = new Date().toLocaleString('he-IL');
    qs('print_meta').innerHTML =
        `<strong>דוח סגירות לידים</strong> · הופק: ${escapeHtml(stamp)}` +
        (active ? `<br>מסננים: ${escapeHtml(active)}` : '') +
        `<br>סה״כ רשומות: ${currentRows.length}`;
    window.print();
}

function exportCsv() {
    if (!currentRows.length) return;
    const cols = ['lead_id','lead_name','lead_phone','lead_email','campaign_name',
                  'assigned_to_name','closed_by','closed_at','previous_status','reason'];
    const headers = ['מס\'','שם','טלפון','אימייל','קמפיין','הוקצה ל','נסגר ע"י','תאריך סגירה','סטטוס קודם','סיבה'];
    const escape = v => {
        if (v === null || v === undefined) return '';
        const s = String(v).replace(/"/g, '""');
        return /[",\n]/.test(s) ? `"${s}"` : s;
    };
    const lines = [headers.join(',')];
    currentRows.forEach(r => {
        lines.push(cols.map(c => escape(c === 'closed_at' ? fmtDate(r[c]) : r[c])).join(','));
    });
    // Prepend BOM so Excel reads UTF-8 properly
    const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `closed_leads_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// Initial load
loadReport();
</script>
</body>
</html>
